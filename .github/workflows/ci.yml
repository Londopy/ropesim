name: CI

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ── Pure-Python tests (no Rust compilation) ────────────────────────────────
  test-pure-python:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python dependencies
        run: pip install numpy pydantic matplotlib pytest pytest-benchmark

      - name: Run pure-Python tests
        run: |
          python -m pytest tests/ -v --tb=short -m "not requires_rust and not benchmark"

  # ── Full tests with compiled Rust extension ────────────────────────────────
  test-with-rust:
    name: Rust+Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ropesim/_rustcore

      - name: Install maturin and Python deps
        run: pip install maturin numpy pydantic matplotlib pytest pytest-benchmark

      - name: Create virtualenv for maturin
        run: python -m venv .venv

      - name: Build and install Rust extension (editable)
        # maturin develop requires a virtualenv; we point it at the one we just created.
        # runner.temp is cross-platform: /home/runner/... on Linux/macOS, %RUNNER_TEMP% on Windows.
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          pip install numpy pydantic matplotlib pytest pytest-benchmark
          maturin develop --release
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/ropesim_target

      - name: Run full test suite
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          python -m pytest tests/ -v --tb=short -m "not benchmark"

  # ── Build wheels ───────────────────────────────────────────────────────────
  build-wheels:
    name: Wheels / ${{ matrix.os }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # Only build on pushes to main or on version tags
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (run inside manylinux container) ──
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto

          # ── macOS (no manylinux) ──
          - os: macos-latest
            target: x86_64
            manylinux: "off"
          - os: macos-latest
            target: aarch64
            manylinux: "off"

          # ── Windows (no manylinux) ──
          - os: windows-latest
            target: x86_64
            manylinux: "off"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels via maturin-action
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          # Explicit interpreter list avoids picking up Python 3.13 which pyo3 0.22
          # still has limited support for on some platforms.
          args: --release --out dist --interpreter python3.11 python3.12
          sccache: true

      - name: Upload wheel artefacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  # ── Source distribution ────────────────────────────────────────────────────
  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: maturin sdist --out dist

      - name: Upload sdist artefact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

